services:
  - type: web
    name: skillmint-backend
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: skillmint-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false # Set this in Render dashboard to your Vercel URL

databases:
  - name: skillmint-db
    plan: free
